<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>이서연 수량 표현 마스터 클리닉 — 영핏 지나티처</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .choice { display: block; width: 100%; text-align: left; padding: 13px 14px; margin-bottom: 9px; font-size: 1rem; background: #f6f9f8; border: 1.5px solid #dde5e3; border-radius: 10px; cursor: pointer; line-height: 1.5; }

  .exp.wrong .head { color: #e07b54; }

  .concept h2 { font-size: 1.1rem; color: #2e7d6e; margin-bottom: 12px; }
  .concept .box { background: #f2f8f6; border: 1.5px solid #cfe3de; border-radius: 12px; padding: 15px 16px; font-size: 0.94rem; line-height: 1.75; margin-bottom: 12px; }
  .concept .box b { color: #2e7d6e; }
  .concept .tip { background: #fff7ee; border: 1.5px solid #f2ddc2; border-radius: 12px; padding: 12px 14px; font-size: 0.92rem; line-height: 1.7; }
  .concept .tip b { color: #c77b2e; }

  table.units td { padding: 5px 6px; border-bottom: 1px solid #e4edea; line-height: 1.5; }
  table.units td:first-child { font-weight: bold; color: #2e7d6e; white-space: nowrap; }
  .hidden { display: none; }
  .footer { text-align: center; font-size: 0.8rem; color: #9ab; margin-top: 8px; }

</head>
<body>
<div class="wrap">

  <!-- 시작 화면 -->
  <div class="card" id="start-card">
    <h1>수량 표현 마스터 클리닉 🌟</h1>
    <p class="sub">이서연의 최상위 도전 클리닉!<br>개념 카드 3개 + 문제 24문항 · 제공: 영핏 지나티처<br>개념 카드를 꼼꼼히 읽고 문제를 풀면 훨씬 쉬워져요 😊</p>

    <button class="btn" id="start-btn" disabled>시작하기</button>
  </div>

  <!-- 개념 카드 화면 -->
  <div class="card hidden concept" id="concept-card">
    <div id="concept-body"></div>
    <button class="btn" id="concept-btn">문제 풀러 가기 ✏️</button>
  </div>

  <!-- 문제 화면 -->
  <div class="card hidden" id="quiz-card">
    <div class="progress" id="progress"></div>
    <div class="bar"><div id="bar-fill"></div></div>
    <div class="qtext" id="qtext"></div>
    <div id="choices"></div>
  </div>

  <!-- 결과 화면 -->
  <div class="card hidden" id="result-card">
    <h1>수고했어요, 서연! 🎉</h1>
    <div class="score-big" id="score-line"></div>
    <div class="cheer" id="cheer-line"></div>
    <button class="btn" id="kakao-btn">결과 복사하기 (지나티처에게 카톡으로 보내기)</button>
    <p class="sub" style="text-align:center; margin-top:10px">복사한 결과를 지나티처에게 <b>카톡으로 꼭</b> 보내주세요!</p>
    <div style="margin-top:16px">
      <p class="sub" style="margin-bottom:10px">📝 전체 해설 — 틀린 문제는 해설을 두 번 읽어보세요!</p>
      <div id="explanations"></div>
    </div>
  </div>

  <div class="footer">영핏 지나티처 · 수량 표현 클리닉</div>
</div>

<script>
"use strict";

var ENGFIT_SUBMIT_URL = "https://script.google.com/macros/s/AKfycbz5IC3cEtaBGW10qZhrjwtjdtGugmcmYb4ZTHS4k-1LOqTRYzW-LfoAPyFB_ShjAqNp/exec";
var _engfitSent = false;
async function engfitSubmitSilent(r) {
  if (_engfitSent) return; _engfitSent = true;
  var body = JSON.stringify(r);
  try {
    var res = await fetch(ENGFIT_SUBMIT_URL, { method: "POST", body: body });
    await res.json();
  } catch (e) {
    try { await fetch(ENGFIT_SUBMIT_URL, { method: "POST", mode: "no-cors", body: body }); } catch (e2) {}
  }
}

/* ══════ 개념 카드 + 문제 데이터 (3섹션 · 24문항) ══════ */
var SECTIONS = [
{
  concept: '<h2>개념 1. 셀 수 없는 명사는 "그릇·단위"를 빌려서 세요!</h2>' +

    '<tr><td>a piece of</td><td>cake / advice (조각·하나)</td></tr>' +
    '<tr><td>a sheet of</td><td>paper (종이 한 장)</td></tr>' +
    '<tr><td>a slice of</td><td>pizza / cheese / ham (얇은 조각)</td></tr>' +
    '<tr><td>a bar of</td><td>soap / chocolate (납작한 덩어리)</td></tr>' +
    '<tr><td>a stick of</td><td>glue / butter (막대 모양)</td></tr>' +

    '<tr><td>a bowl of</td><td>rice / cereal (그릇)</td></tr>' +

    '<tr><td>a spoonful of</td><td>oil / sugar (한 숟갈)</td></tr>' +
    '</table></div>' +
    '<div class="tip"><b>💡 꿀팁</b> — 명사마다 짝꿍 단위가 정해져 있어요! 물은 glass, 종이는 sheet, 풀은 stick. 그리고 둘 이상이면 <b>단위에 -s</b>를 붙여요: two glass<b>es</b> of water (물 자체에는 -s를 안 붙여요!)</div>',
  questions: [
    { q: "I'm so thirsty. Can I have two ___ of water?", kr: "나 너무 목말라. 물 두 잔 마셔도 돼?",

    { q: "다음 중 <u>틀린</u> 표현을 고르세요.", kr: "",

    { q: "We need a pair of scissors and a ___ of glue for art class.", kr: "미술 시간에 가위 하나와 딱풀 하나가 필요해.",

},
{
  concept: '<h2>개념 2. 둘 이상이면 단위에 -s! & pair는 짝꿍 단위</h2>' +
    '<div class="box">숫자가 2 이상이면 <b>단위 명사에 꼭 -s</b>를 붙여요.<br>· two pair<b>s</b> of shoes, three sheet<b>s</b> of paper<br><br>가위(scissors), 바지(pants), 신발(shoes), 양말(socks), 청바지(jeans)처럼 <b>두 짝이 한 세트</b>인 물건은 항상 복수형(-s)으로 쓰고, <b>a pair of ~</b>로 세요.<br>· a pair of <b>scissors</b> (scissor ❌ — 가위는 날이 두 개라서 항상 -s!)<br>· two pairs of <b>shoes</b></div>' +

  questions: [
    { q: "I bought two ___ of shoes at the mall.", kr: "나는 쇼핑몰에서 신발 두 켤레를 샀어.",

    { q: "He bought two pair of socks for his dad. — 틀린 부분을 바르게 고친 것은?", kr: "",

      exp: "two 뒤에 단위가 왔으니 <b>pair → pairs</b>로 고쳐야 해요: two <b>pairs</b> of socks. 양말(socks)은 두 짝 세트라 원래 -s가 붙어 있으니 그대로 두는 게 맞아요!" },
    { q: "My dad packed five ___ of pants for the trip.", kr: "아빠는 여행 가방에 바지 다섯 벌을 넣으셨어.",
      choices: ["pairs", "pair", "sheets", "bowls"], answer: "pairs",
      exp: "바지(pants)도 다리가 두 개라 항상 -s가 붙는 짝꿍 명사! <b>pair of pants</b>로 세고, five가 왔으니 <b>five pairs</b>가 돼요." },
    { q: "다음 중 어법상 <u>옳은</u> 문장을 고르세요.", kr: "",
      choices: ["She gave me a pair of scissors.", "She gave me a pair of scissor.", "She gave me a pairs of scissors.", "She gave me two pair of scissors."], answer: "She gave me a pair of scissors.",
      exp: "가위는 날이 두 개라서 <b>항상 scissors</b>(복수형)로 써요 — scissor라고 쓰면 틀려요! 그리고 하나일 때는 a pair(단수), 둘 이상일 때만 pairs. 그래서 <b>a pair of scissors</b>가 정답이에요." },

    { q: "There are three glasses of milk and some ___ on the table.", kr: "식탁 위에 우유 세 잔과 약간의 쿠키가 있다.",

    { q: "'약간의 책'을 영어로 바르게 쓴 것은?", kr: "",

    { q: "There is some ___ in the glass.", kr: "잔에 약간의 ___가 있다. (알맞은 것은?)",

{

    '<div class="box"><b>많은</b>을 나타낼 때:<br>· <b>many</b> + 셀 수 있는 복수 명사 (many apples, many friends)<br>· <b>much</b> + 셀 수 없는 명사 (much time, much money) — 주로 부정문·의문문에서!<br>· <b>a lot of / lots of</b> = 둘 다 OK! 단, <b>of까지 꼭</b> 써야 해요 (a lot of homework)<br><br><b>적은/약간의</b>를 나타낼 때:<br>· <b>a few</b>(조금 있는 😊) / <b>few</b>(거의 없는 😢) + 셀 수 있는 복수<br>· <b>a little</b>(조금 있는 😊) / <b>little</b>(거의 없는 😢) + 셀 수 없는</div>' +

      exp: "time은 <b>셀 수 없는</b> 명사라서 few가 아니라 <b>little</b>을 써요! few/a few는 apples, friends처럼 셀 수 있는 명사 전용이에요. 그리고 '거의 없다'니까 a 없이 <b>little</b>. a little이면 '조금 있다'는 긍정의 뜻이 돼요." },
    { q: "He has ___ friends, so he feels lonely.", kr: "그는 친구가 거의 없어서 외롭다.",
      choices: ["few", "little", "a little", "much"], answer: "few",
      exp: "friends는 셀 수 있는 복수 명사 → few/a few 팀! '거의 없어서 외롭다'는 부정적인 내용이니 a 없이 <b>few</b>를 써요. a few friends라면 '친구가 좀 있다'는 긍정의 뜻이라 lonely와 안 어울려요." },
    { q: "There is ___ juice in the bottle. Let's share it!", kr: "병에 주스가 조금 있어. 나눠 마시자!",
      choices: ["a little", "a few", "few", "many"], answer: "a little",
      exp: "juice는 셀 수 없는 명사 → little 팀! '나눠 마시자'고 했으니 조금은 있다는 긍정의 뜻 → a를 붙여 <b>a little</b>. a little(조금 있어 😊) vs little(거의 없어 😢), a 하나로 기분이 달라져요!" },
    { q: "She didn't have ___ time.", kr: "그녀는 많은 시간을 가지고 있지 않았다.",
      choices: ["much", "many", "a few", "lots"], answer: "much",
      exp: "time은 셀 수 없는 명사니까 many가 아니라 <b>much</b>! much는 이렇게 부정문(didn't)에서 특히 자주 쓰여요. <b>didn't have much time</b> = 시간이 많지 않았다. lots는 뒤에 of가 있어야 해요(lots of)." },
    { q: "'그는 돈이 많지 않았다'를 바르게 배열한 문장은?", kr: "",
      choices: ["He didn't have much money.", "He didn't have many money.", "He didn't much have money.", "He money didn't have much."], answer: "He didn't have much money.",
      exp: "어순 공식: <b>주어 + didn't + 동사원형 + much + 명사</b>. money는 셀 수 없는 명사라 much와 짝꿍! much는 have 뒤, money 앞에 쏙 들어가요. <b>He didn't have much money.</b> 이 어순을 소리 내어 세 번 읽어보세요!" },
    { q: "Do you have ___ questions?", kr: "질문이 많이 있나요?",
      choices: ["many", "much", "little", "a lot"], answer: "many",
      exp: "questions는 셀 수 <b>있는</b> 복수 명사 → <b>many</b>! much는 셀 수 없는 명사 전용이에요. a lot은 of 없이 명사 앞에 바로 못 와요 (a lot of questions라면 OK). 셀 수 있으면 many, 셀 수 없으면 much!" }
  ]

];

/* ══════ 진행 로직 ══════ */
var QUESTIONS = [];
SECTIONS.forEach(function (s, si) {
  s.questions.forEach(function (q) { q.section = si; QUESTIONS.push(q); });
});

var studentName = "";
var current = 0;
var correctCount = 0;
var wrongNumbers = [];
var answersLog = [];
var startTime = 0;
var shownConcepts = {};

var nameInput = document.getElementById("name-input");
var startBtn = document.getElementById("start-btn");

nameInput.addEventListener("input", function () {
  startBtn.disabled = nameInput.value.trim().length === 0;
});
nameInput.addEventListener("keydown", function (e) {
  if (e.key === "Enter" && nameInput.value.trim()) startBtn.click();
});

startBtn.addEventListener("click", function () {
  studentName = nameInput.value.trim();
  if (!studentName) return;
  startTime = Date.now();
  document.getElementById("start-card").classList.add("hidden");
  nextStep();
});

document.getElementById("concept-btn").addEventListener("click", function () {
  document.getElementById("concept-card").classList.add("hidden");
  document.getElementById("quiz-card").classList.remove("hidden");
  showQuestion();
});

function nextStep() {
  if (current >= QUESTIONS.length) { showResult(); return; }
  var sec = QUESTIONS[current].section;
  if (!shownConcepts[sec]) {
    shownConcepts[sec] = true;
    document.getElementById("quiz-card").classList.add("hidden");
    document.getElementById("concept-body").innerHTML = SECTIONS[sec].concept;
    document.getElementById("concept-card").classList.remove("hidden");
    window.scrollTo(0, 0);
  } else {
    document.getElementById("quiz-card").classList.remove("hidden");
    showQuestion();
  }
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

var CIRCLED = ["①", "②", "③", "④", "⑤"];
var currentChoices = [];

function showQuestion() {
  var q = QUESTIONS[current];
  document.getElementById("progress").textContent = (current + 1) + " / " + QUESTIONS.length;
  document.getElementById("bar-fill").style.width = Math.round(current / QUESTIONS.length * 100) + "%";
  var html = "Q" + (current + 1) + ". " + q.q;
  if (q.kr) html += '<span class="kr">' + q.kr + "</span>";
  document.getElementById("qtext").innerHTML = html;
  var box = document.getElementById("choices");
  box.innerHTML = "";
  currentChoices = shuffle(q.choices);
  currentChoices.forEach(function (c, i) {
    var b = document.createElement("button");
    b.className = "choice";
    b.innerHTML = '<span class="num">' + CIRCLED[i] + "</span>" + c;
    b.addEventListener("click", function () { pick(c); });
    box.appendChild(b);
  });
  window.scrollTo(0, 0);
}

document.addEventListener("keydown", function (e) {
  if (document.getElementById("quiz-card").classList.contains("hidden")) return;
  var n = parseInt(e.key, 10);
  if (n >= 1 && n <= currentChoices.length) pick(currentChoices[n - 1]);
});

var locked = false;
function pick(choice) {
  if (locked) return; locked = true;
  var q = QUESTIONS[current];
  var ok = choice === q.answer;
  if (ok) correctCount++;
  else wrongNumbers.push(current + 1);
  answersLog.push({ no: current + 1, ok: ok, chosen: choice, answer: q.answer });
  setTimeout(function () {
    locked = false;
    current++;
    nextStep();
  }, 250);
}

function cheerMessage() {
  var r = correctCount / QUESTIONS.length;
  if (r === 1) return "완벽해요! 수량 표현 마스터 완성! 👑<br>이 실력 그대로 쭉 가면 최상위가 눈앞이에요.";
  if (r >= 0.8) return "정말 잘했어요! 조금만 더 다듬으면 만점이에요 💪<br>틀린 문제 해설만 꼭 다시 읽어보세요.";
  if (r >= 0.6) return "좋아요, 개념이 자리 잡고 있어요! 🌱<br>해설을 읽고 다시 도전하면 점수가 쑥 올라갈 거예요.";
  return "도전한 것만으로도 멋져요! 🍀<br>개념 카드와 해설을 다시 읽고 한 번 더 풀어보세요. 두 번째는 분명 더 잘할 수 있어요!";
}

function showResult() {
  document.getElementById("quiz-card").classList.add("hidden");
  document.getElementById("concept-card").classList.add("hidden");
  document.getElementById("result-card").classList.remove("hidden");
  document.getElementById("score-line").textContent = correctCount + " / " + QUESTIONS.length;
  document.getElementById("cheer-line").innerHTML = cheerMessage();

  var expBox = document.getElementById("explanations");
  QUESTIONS.forEach(function (q, i) {
    var log = answersLog[i];
    var d = document.createElement("div");
    d.className = "exp" + (log.ok ? "" : " wrong");
    d.innerHTML = '<span class="head">Q' + (i + 1) + ". " + (log.ok ? "정답! 🎯" : "다시 보기 (내 답: " + log.chosen + " → 정답: " + q.answer + ")") + "</span>" + q.exp;
    expBox.appendChild(d);
  });
  window.scrollTo(0, 0);

  engfitSubmitSilent({
    quizId: "clinic-leeseoyeon-0721",
    quizTitle: "이서연 수량 표현 클리닉 7/21",
    student: studentName,
    score: correctCount,
    total: QUESTIONS.length,
    wrong: wrongNumbers,
    durationSec: Math.round((Date.now() - startTime) / 1000),
    detail: answersLog
  });
}

document.getElementById("kakao-btn").addEventListener("click", function () {
  var msg = "[영핏 오답 클리닉 결과]\n학생: " + studentName +
            "\n클리닉: 수량 표현 마스터 (7/21)" +
            "\n점수: " + correctCount + "/" + QUESTIONS.length +
            "\n틀린 문항: " + (wrongNumbers.length ? wrongNumbers.join(", ") : "없음 🎉") +
            "\n풀이 시간: " + Math.round((Date.now() - startTime) / 1000 / 60 * 10) / 10 + "분";
  navigator.clipboard.writeText(msg).then(function () {
    document.getElementById("kakao-btn").textContent = "복사 완료! 지나티처에게 카톡으로 보내주세요 ✓";
  }).catch(function () {
    prompt("아래 내용을 길게 눌러 복사한 뒤 지나티처에게 카톡으로 보내주세요", msg);
  });
});
</script>
