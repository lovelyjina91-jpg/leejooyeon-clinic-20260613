<style>

<div class="wrap">

  <!-- 시작 화면 -->

<script>
"use strict";

/* ══════ 결과 자동 전송 (영핏 공통) ══════ */
var ENGFIT_SUBMIT_URL = "https://script.google.com/macros/s/AKfycbz5IC3cEtaBGW10qZhrjwtjdtGugmcmYb4ZTHS4k-1LOqTRYzW-LfoAPyFB_ShjAqNp/exec";

async function engfitSubmit(r) {
  var body = JSON.stringify(r);
  try {
    var res = await fetch(ENGFIT_SUBMIT_URL, { method: "POST", body: body });
    var j = await res.json();
    return j.ok === true;
  } catch (e) {
    try {
      await fetch(ENGFIT_SUBMIT_URL, { method: "POST", mode: "no-cors", body: body });
      return true;
    } catch (e2) { return false; }
  }
}

var _engfitSent = false;
function engfitSilentSubmit(r) {
  if (_engfitSent) return; _engfitSent = true;
  try { engfitSubmit(r); } catch (e) {}
}

/* ══════ 문제 데이터 ══════
   tag: "재도전" = 오답노트 원본, "변형" = 유사 변형문제
   ko: 우리말 뜻                                              */
var QUESTIONS = [
  /* ── [1] Check2번: be동사 부정문 고르기 ── */
  { tag:"재도전", ko:"그들은 교실에 있지 않다.",
    q:"빈칸에 알맞은 be동사를 골라 문장을 완성한 것은?<br><span class='en'>They ______ not in the classroom.</span>",
    choices:["They are not in the classroom.","They is not in the classroom.","They am not in the classroom.","They be not in the classroom."],
    answer:"They are not in the classroom.",
    exp:"주어 <b>They</b>(그들)는 복수 → be동사는 <b>are</b>! 부정문은 be동사 뒤에 not만 붙이면 돼요: are + not = <b>are not</b>(줄임말 aren't). is, am, be는 they와 짝지어 쓰지 않아요." },
  { tag:"변형", ko:"우리는 파티에 있지 않다.",
    q:"빈칸에 알맞은 be동사를 골라 문장을 완성한 것은?<br><span class='en'>We ______ not at the party.</span>",
    choices:["We are not at the party.","We is not at the party.","We am not at the party.","We not are at the party."],
    answer:"We are not at the party.",
    exp:"<b>We</b>(우리)도 복수 주어라서 <b>are</b>를 써요. We are not = We aren't. 마지막 보기처럼 not이 are 앞으로 가면 순서가 틀려요 — 순서는 항상 [주어 + be동사 + not]!" },
  { tag:"변형", ko:"나는 아직 준비가 안 됐다.",
    q:"빈칸에 알맞은 be동사를 골라 문장을 완성한 것은?<br><span class='en'>I ______ not ready yet.</span>",
    choices:["I am not ready yet.","I is not ready yet.","I are not ready yet.","I not am ready yet."],
    answer:"I am not ready yet.",
    exp:"주어가 <b>I</b>(나)일 때는 무조건 <b>am</b>! I am not = I'm not. am은 I하고만 짝을 이루는 단짝이에요." },

  /* ── [2] Check14번: aren't/isn't 구별(단복수) ── */
  { tag:"재도전", ko:"레몬은 달콤하지 않다.",
    q:"다음 중 알맞은 것을 고르세요.",
    choices:["Lemons aren't sweet.","Lemons isn't sweet.","Lemon aren't sweet.","Lemons not sweet."],
    answer:"Lemons aren't sweet.",
    exp:"<b>Lemons</b>는 복수(레몬들)니까 부정문도 <b>aren't</b>(are not)를 써요. isn't는 단수 주어에만 써요. Lemon처럼 s를 빼먹으면 안 돼요 — 복수는 항상 s!" },
  { tag:"변형", ko:"바나나들은 비싸지 않다.",
    q:"다음 중 알맞은 것을 고르세요.",
    choices:["Bananas aren't expensive.","Bananas isn't expensive.","Banana aren't expensive.","Bananas not expensive."],
    answer:"Bananas aren't expensive.",
    exp:"<b>Bananas</b>(바나나들)도 복수 → <b>aren't</b>. 복수 명사에는 반드시 aren't를 짝지어 기억하세요." },
  { tag:"변형", ko:"이 사과는 시지 않다.",
    q:"다음 중 알맞은 것을 고르세요.",
    choices:["This apple isn't sour.","This apple aren't sour.","This apples isn't sour.","This apple not sour."],
    answer:"This apple isn't sour.",
    exp:"<b>This apple</b>(이 사과 하나)는 단수 → <b>isn't</b>(is not)를 써요. This(이) 뒤에는 항상 단수 명사가 와요 — apple에 s를 붙이면 안 돼요." },

  /* ── [3] Practice6번: she/he/it → isn't ── */
  { tag:"재도전", ko:"그녀는 나의 여동생이 아니다.",
    q:"다음 문장에서 밑줄 친 부분을 바르게 고친 것은?<br><span class='en'>She <u>aren't</u> my sister.</span>",
    choices:["She isn't my sister.","She aren't my sister.","She not is my sister.","She amn't my sister."],
    answer:"She isn't my sister.",
    exp:"<b>She</b>(그녀)는 단수 → be동사는 is, 부정은 <b>isn't</b>! aren't는 복수 주어(they, we, you)에만 써요. she/he/it은 항상 isn't로 기억하세요." },
  { tag:"변형", ko:"그는 선생님이 아니다.",
    q:"다음 문장에서 밑줄 친 부분을 바르게 고친 것은?<br><span class='en'>He <u>aren't</u> a teacher.</span>",
    choices:["He isn't a teacher.","He aren't a teacher.","He not is a teacher.","He amn't a teacher."],
    answer:"He isn't a teacher.",
    exp:"He도 단수 → <b>isn't</b>. she/he/it은 셋 다 is 가족이라 부정문도 isn't 하나로 통일돼요." },
  { tag:"변형", ko:"그것은 고장 나지 않았다.",
    q:"다음 문장에서 밑줄 친 부분을 바르게 고친 것은?<br><span class='en'>It <u>aren't</u> broken.</span>",
    choices:["It isn't broken.","It aren't broken.","It not is broken.","It amn't broken."],
    answer:"It isn't broken.",
    exp:"It도 단수 → <b>isn't</b>. he/she/it 세 친구는 모두 is·isn't를 쓴다는 것, 이제 확실하죠?" },

  /* ── [4] Practice7번: amn't는 없는 말 → I'm not ── */
  { tag:"재도전", ko:"나는 댄서가 아니다.",
    q:"다음 문장에서 밑줄 친 부분을 바르게 고친 것은?<br><span class='en'>I <u>amn't</u> a dancer.</span>",
    choices:["I'm not a dancer.","I amn't a dancer.","I not a dancer.","I isn't a dancer."],
    answer:"I'm not a dancer.",
    exp:"영어에는 <b>amn't</b>라는 말이 없어요! I는 항상 <b>I'm not</b>(= I am not)으로 부정문을 만들어요. 규칙이 아니라 그냥 외워야 하는 예외예요." },
  { tag:"변형", ko:"나는 배고프지 않다.",
    q:"다음 문장에서 밑줄 친 부분을 바르게 고친 것은?<br><span class='en'>I <u>amn't</u> hungry.</span>",
    choices:["I'm not hungry.","I amn't hungry.","I not hungry.","I aren't hungry."],
    answer:"I'm not hungry.",
    exp:"역시 amn't는 틀린 표현! <b>I'm not</b>(I am not)으로만 써요. I + not 조합은 딱 하나, I'm not이에요." },
  { tag:"변형", ko:"나는 학교에 있지 않다.",
    q:"다음 문장에서 밑줄 친 부분을 바르게 고친 것은?<br><span class='en'>I <u>amn't</u> at school.</span>",
    choices:["I'm not at school.","I amn't at school.","I not at school.","I isn't at school."],
    answer:"I'm not at school.",
    exp:"마찬가지로 amn't는 없는 말! <b>I'm not at school</b>이 맞아요. amn't라는 단어 자체를 지워버리세요 — 존재하지 않는 말이니까요." },

  /* ── [5] Practice13번: A and B = we → aren't(줄임말) ── */
  { tag:"재도전", ko:"Jenny와 나는 바쁘지 않다.",
    q:"우리말과 같은 뜻이 되도록 빈칸에 알맞은 말을 줄임말로 쓴 것은?<br><span class='en'>Jenny and I ______ busy.</span>",
    choices:["Jenny and I aren't busy.","Jenny and I isn't busy.","Jenny and I amn't busy.","Jenny and I not busy."],
    answer:"Jenny and I aren't busy.",
    exp:"Jenny and I(제니와 나) = 두 명이니까 <b>we</b>로 바꿀 수 있어요. we는 복수 → be동사 are, 부정 줄임말은 <b>aren't</b>! and로 연결되면 항상 복수예요." },
  { tag:"변형", ko:"Tom과 Amy는 준비되지 않았다.",
    q:"우리말과 같은 뜻이 되도록 빈칸에 알맞은 말을 줄임말로 쓴 것은?<br><span class='en'>Tom and Amy ______ ready.</span>",
    choices:["Tom and Amy aren't ready.","Tom and Amy isn't ready.","Tom and Amy amn't ready.","Tom and Amy not ready."],
    answer:"Tom and Amy aren't ready.",
    exp:"Tom and Amy = <b>they</b>(그들)로 바꿀 수 있는 복수 주어 → <b>aren't</b>. and로 연결된 이름 두 개는 항상 복수 취급!" },
  { tag:"변형", ko:"너와 Ben은 늦지 않았다.",

  /* ── [6] Practice18번: 줄임말 사용 안함 → is not/are not 풀어쓰기 ── */
  { tag:"재도전", ko:"Ben은 나의 반 친구가 아니다.",
    q:"우리말과 같은 뜻이 되도록 빈칸에 알맞은 말을 쓴 것은? (줄임말 사용 안 함)<br><span class='en'>Ben ______ ______ my classmate.</span>",
    choices:["Ben is not my classmate.","Ben isn't not my classmate.","Ben are not my classmate.","Ben not is my classmate."],
    answer:"Ben is not my classmate.",

  { tag:"변형", ko:"Mina는 나의 사촌이 아니다.",
    q:"우리말과 같은 뜻이 되도록 빈칸에 알맞은 말을 쓴 것은? (줄임말 사용 안 함)<br><span class='en'>Mina ______ ______ my cousin.</span>",
    choices:["Mina is not my cousin.","Mina isn't not my cousin.","Mina are not my cousin.","Mina not is my cousin."],
    answer:"Mina is not my cousin.",
    exp:"Mina도 한 사람(she) → is. 줄임말 없이 쓰라고 했으니 <b>is not</b>을 그대로 두 단어로 써야 해요." },
  { tag:"변형", ko:"그 소년들은 나의 친구들이 아니다.",
    q:"우리말과 같은 뜻이 되도록 빈칸에 알맞은 말을 쓴 것은? (줄임말 사용 안 함)<br><span class='en'>The boys ______ ______ my friends.</span>",
    choices:["The boys are not my friends.","The boys is not my friends.","The boys isn't not my friends.","The boys not are my friends."],
    answer:"The boys are not my friends.",
    exp:"<b>The boys</b>(그 소년들)는 복수 → are. 줄임말 없이 쓰라 했으니 <b>are not</b> 그대로! 이번엔 주어가 복수로 바뀌었으니 be동사도 바뀐다는 것에 주의하세요." },

  /* ── [7] Upgrade1번: I am not hungry ── */
  { tag:"재도전", ko:"나는 배고프지 않다.",

  { tag:"변형", ko:"그는 피곤하지 않다.",
    q:"우리말과 같은 뜻이 되도록 바르게 완성한 문장은? (힌트: be, tired)",

  { tag:"변형", ko:"우리는 늦지 않았다.",
    q:"우리말과 같은 뜻이 되도록 바르게 완성한 문장은? (힌트: be, late)",

    answer:"We are not late.",

  /* ── [8] Upgrade3번: She is not a singer ── */
  { tag:"재도전", ko:"그녀는 가수가 아니다.",
    q:"우리말과 같은 뜻이 되도록 바르게 완성한 문장은? (힌트: be, a singer)",
    choices:["She is not a singer.","She not is a singer.","She are not a singer.","She isn't a not singer."],
    answer:"She is not a singer.",
    exp:"주어 She → 단수 → is. [She + is + not + a singer] → <b>She is not a singer.</b> 셀 수 있는 명사 singer 앞에는 a도 잊지 마세요!" },
  { tag:"변형", ko:"그는 의사가 아니다.",
    q:"우리말과 같은 뜻이 되도록 바르게 완성한 문장은? (힌트: be, a doctor)",
    choices:["He is not a doctor.","He not is a doctor.","He are not a doctor.","He isn't not a doctor."],
    answer:"He is not a doctor.",

/* ══════ 보기 셔플 (정답 위치 1~4 균등 분산) ══════ */
function fyShuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function shuffleChoices() {
  var n = QUESTIONS.length;
  var slots = 4;
  var pool = [];
  var base = Math.floor(n / slots);
  for (var p = 0; p < slots; p++) for (var k = 0; k < base; k++) pool.push(p);
  var extra = n % slots;
  var posList = [0,1,2,3];
  fyShuffle(posList);
  for (var e = 0; e < extra; e++) pool.push(posList[e]);
  fyShuffle(pool);
  QUESTIONS.forEach(function (q, idx) {
    var arr = fyShuffle(q.choices.slice());
    var target = pool[idx];
    var ai = arr.indexOf(q.answer);
    var t = arr[target]; arr[target] = arr[ai]; arr[ai] = t;
    q.choices = arr;
  });
}

/* ══════ 진행 로직 ══════ */
var studentName = "";
var current = 0;
var correctCount = 0;
var wrongNumbers = [];
var answersLog = [];
var startTime = 0;
var locked = false;

var nameInput = document.getElementById("name-input");
var startBtn = document.getElementById("start-btn");

nameInput.addEventListener("input", function () {
  startBtn.disabled = nameInput.value.trim().length === 0;
});
nameInput.addEventListener("keydown", function (e) {
  if (e.key === "Enter" && nameInput.value.trim()) startBtn.click();
});
startBtn.addEventListener("click", function () {
  studentName = nameInput.value.trim();
  if (!studentName) return;
  shuffleChoices();
  document.getElementById("start-card").classList.add("hidden");
  document.getElementById("quiz-card").classList.remove("hidden");
  startTime = Date.now();
  renderQuestion();
});

function renderQuestion() {
  locked = false;
  var q = QUESTIONS[current];
  document.getElementById("progress").textContent = "문제 " + (current + 1) + " / " + QUESTIONS.length;
  document.getElementById("bar-fill").style.width = (current / QUESTIONS.length * 100) + "%";
  var html = "<span class='tag " + (q.tag === "재도전" ? "retry" : "vari") + "'>" + q.tag + "</span>";
  if (q.ko) html += "<div class='ko'>" + q.ko + "</div>";
  html += "<div class='qtext'>" + q.q + "</div><div id='choices'></div>";
  document.getElementById("qbody").innerHTML = html;
  var box = document.getElementById("choices");
  q.choices.forEach(function (c, i) {
    var b = document.createElement("button");
    b.className = "choice";
    b.innerHTML = "<span class='num'>" + (i + 1) + "</span>" + c;
    b.addEventListener("click", function () { pick(i, b); });
    box.appendChild(b);
  });
  window.scrollTo(0, 0);
}

function pick(i, btn) {
  if (locked) return;
  locked = true;
  var q = QUESTIONS[current];
  var chosen = q.choices[i];
  var ok = chosen === q.answer;
  if (ok) correctCount++;
  else wrongNumbers.push(current + 1);
  answersLog.push({ no: current + 1, ok: ok, chosen: chosen, answer: q.answer });
  setTimeout(function () {
    current++;
    if (current < QUESTIONS.length) renderQuestion();
    else showResult();
  }, 250);
}

document.addEventListener("keydown", function (e) {
  if (document.getElementById("quiz-card").classList.contains("hidden")) return;
  var n = parseInt(e.key, 10);
  if (n >= 1 && n <= QUESTIONS[current].choices.length) {
    var btns = document.querySelectorAll("#choices .choice");
    if (btns[n - 1]) pick(n - 1, btns[n - 1]);
  }
});

/* ══════ 결과 화면 ══════ */
function showResult() {
  document.getElementById("quiz-card").classList.add("hidden");
  document.getElementById("result-card").classList.remove("hidden");
  document.getElementById("r-name").textContent = studentName;
  document.getElementById("score-line").textContent = correctCount + " / " + QUESTIONS.length;
  var msg;
  if (correctCount === QUESTIONS.length) msg = "완벽해요! be동사 마스터 인정 👑";
  else if (correctCount >= 36) msg = "정말 잘했어요! 틀린 문제만 한 번 더 보면 끝!";
  else if (correctCount >= 25) msg = "잘했어요! 해설을 천천히 읽으면 금방 채워질 거예요 😊";
  else msg = "끝까지 푼 것만으로도 멋져요! 해설 읽고 다시 도전해봐요 💪";
  document.getElementById("score-msg").textContent = msg;

  var expBox = document.getElementById("explanations");
  QUESTIONS.forEach(function (q, idx) {
    var log = answersLog[idx];
    var d = document.createElement("div");
    d.className = "exp" + (log.ok ? "" : " wrong");
    d.innerHTML = "<b>" + (idx + 1) + "번 " + (log.ok ? "⭕ 정답" : "❌ 오답") + "</b> · 정답: <span class='en'>" + q.answer + "</span>" +
      (log.ok ? "" : " (승민이가 고른 답: <span class='en'>" + log.chosen + "</span>)") +
      "<br>" + q.exp;
    expBox.appendChild(d);
  });
  window.scrollTo(0, 0);

  engfitSilentSubmit({
    quizId: "clinic-leeseungmin-20260722",
    quizTitle: "이승민 오답 클리닉 — be동사의 현재형 총정리 7/22",
    student: studentName,
    score: correctCount,
    total: QUESTIONS.length,
    wrong: wrongNumbers,
    durationSec: Math.round((Date.now() - startTime) / 1000),
    detail: answersLog
  });
}

/* ══════ 카톡 복사 ══════ */
document.getElementById("kakao-btn").addEventListener("click", function () {
  var lines = [
    "[영핏 오답 클리닉 결과]",
    "이름: " + studentName,
    "퀴즈: be동사의 현재형 총정리 (7/22)",
    "점수: " + correctCount + " / " + QUESTIONS.length,
    "틀린 문항: " + (wrongNumbers.length ? wrongNumbers.join(", ") + "번" : "없음 🎉"),
    "제공: 영핏 지나티처"
  ];
  var text = lines.join("\n");
  var btn = this;
  function done() { btn.textContent = "복사 완료! 카톡에 붙여넣기 하세요 ✓"; }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done, function () { fallbackCopy(text, done); });
  } else { fallbackCopy(text, done); }
});
function fallbackCopy(text, done) {
  var ta = document.createElement("textarea");
  ta.value = text; document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); done(); } catch (e) { alert(text); }
  document.body.removeChild(ta);
}
