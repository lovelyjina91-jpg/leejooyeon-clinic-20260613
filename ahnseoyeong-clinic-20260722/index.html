<script>
"use strict";

/* ══════ 결과 자동 전송 (영핏 공통, 조용히 전송만) ══════ */
var ENGFIT_SUBMIT_URL = "https://script.google.com/macros/s/AKfycbz5IC3cEtaBGW10qZhrjwtjdtGugmcmYb4ZTHS4k-1LOqTRYzW-LfoAPyFB_ShjAqNp/exec";

async function engfitSubmit(r) {
  var body = JSON.stringify(r);
  try {
    var res = await fetch(ENGFIT_SUBMIT_URL, { method: "POST", body: body });
    var j = await res.json();
    return j.ok === true;
  } catch (e) {
    try {
      await fetch(ENGFIT_SUBMIT_URL, { method: "POST", mode: "no-cors", body: body });
      return true;
    } catch (e2) { return false; }
  }
}

var _engfitSent = false;
function engfitSubmitSilently(r) {
  if (_engfitSent) return;
  _engfitSent = true;
  engfitSubmit(r);
}

/* ══════ 오답 이유 리뷰 데이터 (17개) ══════ */
var REASONS = [
  { section: "modal", kor: "짧은 대화 중 의미가 어색한 것 고르기 (must / be able to)",
    why: "must(꼭 해야 한다)로 물으면 부정 대답은 don't have to(안 해도 돼)를 써요. Is she able to ~?(~할 수 있니?)로 물었으면 대답도 be동사(isn't)로 받아야 자연스러워요. 조동사마다 뜻이 다르니, 질문과 대답이 같은 조동사 짝인지 확인하는 습관이 필요해요." },
  { section: "modal", kor: "He cannot finish the work today. → 같은 뜻으로 바꿔쓰기",
    why: "cannot은 is/am/are not able to와 같은 뜻이에요. 주어에 맞는 be동사 + not + able to 순서를 다 갖춰야 해요. 조동사 cannot 하나가 'be동사 + not + able + to' 네 단어 몫을 한다는 걸 기억해요." },
  { section: "modal", kor: "I ___ check my email. I forgot my password. (can / cannot / must not / may)",
    why: "비밀번호를 잊어서 '이메일을 확인할 수 없는' 상황이에요. 이건 능력·가능성이 없다는 뜻이라 cannot이 맞아요. must not은 '~하면 안 된다'는 금지의 뜻이라 상황 자체가 달라요. 문장이 왜 그런 상황인지부터 파악하고 조동사를 골라야 해요." },
  { section: "past", kor: "I lost my passport at the airport. → 부정문 만들기",
    why: "과거 부정문은 don't이 아니라 didn't! 그리고 didn't 뒤에는 과거형 lost가 아니라 원래 모양인 lose를 써야 해요. didn't가 이미 '과거'라는 뜻을 다 갖고 있어서, 동사는 원형으로 돌아가는 거예요." },
  { section: "past", kor: "영화·뮤지컬 대화 완성하기 (Do→Did, watch→watched, didn't understood→didn't understand)",
    why: "지난 일을 묻는 질문은 Do가 아니라 Did로 시작해요. 실제로 한 일(뮤지컬을 봤다)은 과거형 그대로(watched) 쓰고, '이해하지 못했다'처럼 didn't가 붙는 자리는 반드시 동사원형(understand)으로 써야 해요. 세 실수 모두 같은 뿌리예요." },
  { section: "past", kor: "Robert가 너의 사무실을 방문했니? → Did Robert visit your office?",
    why: "과거 의문문은 Did + 주어 + 동사원형 순서예요. 어제(yesterday) 있었던 일이니 Did로 시작하고, visit은 원형 그대로 써요." },
  { section: "past", kor: "Sam은 어제 나를 기다리지 않았다. → Sam didn't wait for me yesterday.",
    why: "yesterday가 있으니 과거 부정문. didn't 뒤에는 waited가 아니라 동사원형 wait을 써요." },
  { section: "past", kor: "그는 지난 주말에 금메달을 땄니? → Did he win a gold medal? / Yes, he did.",
    why: "대답이 Yes, he did.로 나오려면 질문도 Did로 시작해야 짝이 맞아요. Did가 과거를 다 책임지니까 뒤 동사는 won이 아니라 원형 win이에요." },
  { section: "past", kor: "너의 컴퓨터는 잘 작동했니? → Did your computer work? / No, it didn't.",
    why: "대답이 No, it didn't.니까 질문도 Did로 물어야 해요. B의 대답 형태를 보면 A가 어떤 조동사로 물었는지 거꾸로 알 수 있어요." },
  { section: "past", kor: "나는 지난 주말에 쇼핑을 가지 않았다. → I didn't go shopping last weekend.",
    why: "last weekend은 과거. didn't 뒤에는 went가 아니라 원형 go를 써서 go shopping이 돼요." },
  { section: "past", kor: "Mia는 그녀의 차를 팔았니? → Did Mia sell her car?",
    why: "'팔았니?'는 과거 질문이니 Did로 시작해요. sold(과거형)가 아니라 원형 sell을 그대로 써야 해요." },
  { section: "past", kor: "나는 그녀를 새로운 식당에 데리고 가지 않았다. → I didn't take her to a new restaurant.",
    why: "didn't 뒤에는 took이 아니라 원형 take를 써요. take는 불규칙 동사라 특히 헷갈리기 쉬워요." },
  { section: "past", kor: "너는 너의 우산을 잃어버렸니? → Did you lose your umbrella?",
    why: "yesterday류 시간 표현이 없어도 문맥상 과거 질문이면 Did를 써요. lost가 아니라 lose(원형)로 물어야 해요." },
  { section: "past", kor: "그는 어제 우유를 마시지 않았다. 그는 주스를 마셨다. → He didn't drink milk yesterday. He drank juice.",
    why: "부정문(didn't drink)과 긍정문(drank)이 한 문제에 같이 나온 케이스예요. didn't 뒤는 원형(drink), 긍정문은 과거형 그대로(drank) — 두 규칙을 헷갈리지 않는 게 핵심이에요." },
  { section: "past", kor: "나는 어제 숙제를 하지 않았다. → I did not do my homework yesterday.",
    why: "did not(=didn't) 뒤에는 동사 do도 원형 그대로 써요. '~했다'는 뜻의 did와 '하다'는 뜻의 동사 do가 나란히 나와서 헷갈리기 쉬운 문장이에요." },
  { section: "past", kor: "Amy는 간식으로 머핀을 먹지 않았다. 그녀는 도넛을 먹었다. → Amy didn't eat muffins. She ate donuts.",
    why: "didn't 뒤는 eat(원형), 실제로 한 일을 말하는 긍정문에는 ate(불규칙 과거형)를 써요. eat-ate처럼 불규칙 동사는 원형과 과거형을 짝지어 외워두면 실수가 줄어요." },
  { section: "past", kor: "그 남자는 그 그림을 팔지 않았다. → The man didn't sell the painting.",
    why: "didn't 뒤에는 sold(과거형)가 아니라 원형 sell을 써요. 지금까지 나온 모든 didn't 문제와 똑같은 규칙이에요 — 이 규칙 하나만 확실히 잡으면 오늘 틀린 문제 대부분이 해결돼요!" }
];

var SEC_LABEL = { modal: "조동사 (can/must/may)", past: "일반동사 과거형 (didn't + 동사원형)" };

/* ══════ 문제 데이터 (34문항 = 오답 17개 × 유사문제 2개) ══════ */
var QUESTIONS = [
  { section: "modal", q: "A: Must we finish this today?\nB: ______",
    choices: ["No, you don't have to.", "No, you aren't.", "Yes, you can.", "No, you can't."],
    answer: "No, you don't have to.",
    exp: "Must(~해야 한다)로 물으면 '안 해도 돼'라는 부정 대답은 don't have to를 써요. can't, aren't는 다른 조동사의 대답 짝이라 안 어울려요." },
  { section: "modal", q: "A: Is Tom able to swim?\nB: ______",
    choices: ["Yes, he is.", "Yes, he does.", "Yes, he can do.", "Yes, he must."],
    answer: "Yes, he is.",
    exp: "Is ~ able to...?로 물었으니 대답도 be동사(is)로 받아야 자연스러워요. 질문에 쓰인 동사 형태를 그대로 대답에 맞추는 게 핵심이에요." },
  { section: "modal", q: "She cannot solve the problem.\n→ She ___ ___ ___ solve the problem.",
    choices: ["is not able to", "does not able to", "is not able", "not able to"],
    answer: "is not able to",
    exp: "cannot = is/am/are not able to. 주어가 She(3인칭 단수)니까 be동사 is + not + able to까지 순서대로 다 써야 해요." },
  { section: "modal", q: "I cannot lift this box.\n→ I ___ ___ ___ lift this box.",
    choices: ["am not able to", "is not able to", "do not able to", "am not able"],
    answer: "am not able to",
    exp: "주어가 I니까 be동사는 am. cannot 자리에 am not able to를 통째로 넣어주면 돼요." },
  { section: "modal", q: "I ___ enter the room. I lost the key.",
    choices: ["cannot", "must not", "may not", "should"],
    answer: "cannot",
    exp: "열쇠를 잃어버려서 '들어갈 수가 없는' 상황이에요. 능력·가능성이 없다는 뜻이니 cannot이 맞아요. must not은 '규칙상 하면 안 된다'는 금지라 상황이 달라요." },
  { section: "modal", q: "You ___ touch this. It's very hot.",
    choices: ["must not", "cannot", "are not able to", "don't"],
    answer: "must not",
    exp: "'뜨거우니까 만지면 안 돼'는 능력 문제가 아니라 하지 말라는 경고(금지)예요. must not이 어울려요. cannot은 '할 수 없다'는 능력 부정이라 다른 상황이에요." },
  { section: "past", q: "I ___ ___ my wallet at the station. (lose)\n나는 역에서 지갑을 잃어버리지 않았다.",
    choices: ["didn't lose", "don't lost", "didn't lost", "not lost"],
    answer: "didn't lose",
    exp: "과거 부정문은 didn't + 동사원형! lost처럼 이미 과거형인 채로 didn't 뒤에 쓰면 안 돼요. lose로 돌아가야 해요." },
  { section: "past", q: "She ___ ___ her keys at the airport. (lose)\n그녀는 공항에서 열쇠를 잃어버리지 않았다.",
    choices: ["didn't lose", "doesn't lose", "didn't lost", "not lose"],
    answer: "didn't lose",
    exp: "주어가 She여도 과거 부정문은 항상 didn't + 동사원형이에요. doesn't는 현재형에서만 써요." },
  { section: "past", q: "A: ___ you watch the movie last night?\nB: No, I didn't. I read a book.",
    choices: ["Did", "Do", "Does", "Were"],
    answer: "Did",
    exp: "어제 있었던 일을 묻는 질문이니 과거 의문문 Did로 시작해야 해요. Do는 현재형 질문에만 써요." },
  { section: "past", q: "I ___ ___ the question at first, but my teacher explained it again. (understand)",
    choices: ["didn't understand", "didn't understood", "don't understand", "not understood"],
    answer: "didn't understand",
    exp: "'처음엔 이해하지 못했다'는 과거 부정문이라 didn't + 동사원형(understand)이 맞아요. understood는 이미 과거형이라 didn't 뒤에 다시 쓰면 안 돼요." },
  { section: "past", q: "___ Robert visit your office yesterday?\n로버트가 어제 너의 사무실을 방문했니?",
    choices: ["Did", "Does", "Do", "Was"],
    answer: "Did",
    exp: "yesterday가 있으니 Did로 질문을 시작하고, 뒤에는 동사원형 visit을 그대로 써요." },
  { section: "past", q: "___ your sister call you last night?\n너희 언니가 어젯밤에 너에게 전화했니?",
    choices: ["Did", "Does", "Is", "Do"],
    answer: "Did",
    exp: "last night은 과거를 나타내는 표현이라 Did로 질문을 시작해요. Did 뒤 동사는 항상 원형(call)이에요." },
  { section: "past", q: "Sam ___ ___ for me yesterday.\nSam은 어제 나를 기다리지 않았다.",
    choices: ["didn't wait", "doesn't wait", "didn't waited", "not waited"],
    answer: "didn't wait",
    exp: "yesterday가 있으니 과거 부정문. didn't 뒤에는 waited가 아니라 동사원형 wait을 써요." },
  { section: "past", q: "They ___ ___ for the bus this morning.\n그들은 오늘 아침 버스를 기다리지 않았다.",
    choices: ["didn't wait", "don't wait", "didn't waited", "wasn't wait"],
    answer: "didn't wait",
    exp: "this morning도 이미 지나간 시점이라 과거예요. didn't + 동사원형(wait) 규칙은 주어가 They여도 똑같이 적용돼요." },
  { section: "past", q: "A: ___ he win a gold medal at the contest?\nB: Yes, he did.",
    choices: ["Did", "Does", "Was", "Is"],
    answer: "Did",
    exp: "대답이 Yes, he did.니까 질문도 Did로 시작해야 짝이 맞아요. 뒤 동사는 won이 아니라 win(원형) 그대로예요." },
  { section: "past", q: "A: ___ she win the singing contest?\nB: Yes, she did.",

/* ══════ 진행 로직 ══════ */
var studentName = "";
var current = 0;
var correctCount = 0;
var wrongNumbers = [];
var answersLog = [];
var startTime = 0;

var nameInput = document.getElementById("name-input");
var startBtn = document.getElementById("start-btn");

nameInput.addEventListener("input", function () {
  startBtn.disabled = nameInput.value.trim().length === 0;
});

startBtn.addEventListener("click", function () {
  studentName = nameInput.value.trim();
  if (!studentName) return;
  document.getElementById("start-card").classList.add("hidden");
  document.getElementById("review-card").classList.remove("hidden");
  renderReasons();
});

function renderReasons() {
  var box = document.getElementById("reason-list");
  box.innerHTML = "";
  var lastSection = null;
  REASONS.forEach(function (r, i) {
    if (r.section !== lastSection) {
      lastSection = r.section;
      var t = document.createElement("div");
      t.className = "reason-sec-title";
      t.textContent = SEC_LABEL[r.section];
      box.appendChild(t);
    }
    var d = document.createElement("div");
    d.className = "reason-card";
    d.innerHTML = "<div class='rk'>" + (i + 1) + ". " + r.kor + "</div><div class='rk-why'>" + r.why + "</div>";
    box.appendChild(d);
  });
}

document.getElementById("to-quiz-btn").addEventListener("click", function () {
  startTime = Date.now();
  shuffleChoices();
  document.getElementById("review-card").classList.add("hidden");
  document.getElementById("quiz-card").classList.remove("hidden");
  showQuestion();
});

/* 균등 분산 셔플: 정답 위치가 회차마다 골고루 퍼지도록 */
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function balancedPositions(n, k) {
  var base = Math.floor(n / k), rem = n % k;
  var extra = shuffle([0, 1, 2, 3].slice(0, k)).slice(0, rem);
  var pool = [];
  for (var p = 0; p < k; p++) {
    var count = base + (extra.indexOf(p) !== -1 ? 1 : 0);
    for (var c = 0; c < count; c++) pool.push(p);
  }
  return shuffle(pool);
}

function shuffleChoices() {
  var k = 4;
  var targetPositions = balancedPositions(QUESTIONS.length, k);
  QUESTIONS.forEach(function (q, idx) {
    var shuffled = shuffle(q.choices);
    var curIdx = shuffled.indexOf(q.answer);
    var targetIdx = targetPositions[idx];
    if (curIdx !== targetIdx) {
      var t = shuffled[curIdx];
      shuffled[curIdx] = shuffled[targetIdx];
      shuffled[targetIdx] = t;
    }
    q.shuffled = shuffled;
  });
}

var CIRCLED = ["①", "②", "③", "④"];

function showQuestion() {
  var q = QUESTIONS[current];
  document.getElementById("section-badge").textContent = SEC_LABEL[q.section];
  document.getElementById("progress").textContent = (current + 1) + " / " + QUESTIONS.length;
  document.getElementById("bar-inner").style.width = Math.round(((current) / QUESTIONS.length) * 100) + "%";
  document.getElementById("qtext").textContent = "Q" + (current + 1) + ". " + q.q;
  var box = document.getElementById("choices");
  box.innerHTML = "";
  q.shuffled.forEach(function (c, i) {
    var b = document.createElement("button");
    b.className = "choice";
    b.innerHTML = '<span class="num">' + CIRCLED[i] + "</span>" + c;
    b.addEventListener("click", function () { pick(c); });
    box.appendChild(b);
  });
}

var locked = false;
function pick(choice) {
  if (locked) return; locked = true;
  var q = QUESTIONS[current];
  var ok = choice === q.answer;
  if (ok) correctCount++;
  else wrongNumbers.push(current + 1);
  answersLog.push({ no: current + 1, ok: ok, chosen: choice, answer: q.answer });
  setTimeout(function () {
    locked = false;
    current++;
    if (current < QUESTIONS.length) showQuestion();
    else showResult();
  }, 250);
}

document.addEventListener("keydown", function (e) {
  if (document.getElementById("quiz-card").classList.contains("hidden")) return;
  var n = parseInt(e.key, 10);
  if (n >= 1 && n <= 4) {
    var q = QUESTIONS[current];
    if (q.shuffled[n - 1]) pick(q.shuffled[n - 1]);
  }
});

function showResult() {
  document.getElementById("quiz-card").classList.add("hidden");
  document.getElementById("result-card").classList.remove("hidden");
  document.getElementById("score-line").textContent = correctCount + " / " + QUESTIONS.length;

  var expBox = document.getElementById("explanations");
  QUESTIONS.forEach(function (q, i) {
    var log = answersLog[i];
    var d = document.createElement("div");
    d.className = "exp" + (log.ok ? "" : " wrong");
    d.innerHTML = "<b>Q" + (i + 1) + ". " + (log.ok ? "정답!" : "오답 (내 답: " + log.chosen + " → 정답: " + q.answer + ")") + "</b><br>" + q.exp;
    expBox.appendChild(d);
  });

  engfitSubmitSilently({
    quizId: "clinic-ahnseoyeong-20260722",
    quizTitle: "안서영 오답 클리닉 7/22 (조동사·일반동사 과거형)",
    student: studentName,
    score: correctCount,
    total: QUESTIONS.length,
    wrong: wrongNumbers,
    durationSec: Math.round((Date.now() - startTime) / 1000),
    detail: answersLog
  });
}

document.getElementById("kakao-btn").addEventListener("click", function () {
  var msg = "[안서영 오답 클리닉 결과]\n학생: " + studentName +
            "\n점수: " + correctCount + "/" + QUESTIONS.length +
            "\n틀린 문항: " + (wrongNumbers.length ? wrongNumbers.join(", ") : "없음");
  navigator.clipboard.writeText(msg).then(function () {
    document.getElementById("kakao-btn").textContent = "복사 완료! 카톡에 붙여넣기 하세요 ✓";
  }).catch(function () {
    prompt("아래 내용을 길게 눌러 복사하세요", msg);
  });
});
