/* ══════ 보기 셔플 (정답 위치 균등 분산) ══════ */
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function shuffleChoices() {
  var k = 4, n = QUESTIONS.length;
  var pool = [];
  var per = Math.floor(n / k);
  for (var p = 0; p < k; p++) for (var c = 0; c < per; c++) pool.push(p);
  var extras = shuffle([0, 1, 2, 3]).slice(0, n % k);
  extras.forEach(function (p) { pool.push(p); });
  pool = shuffle(pool);
  QUESTIONS.forEach(function (q, i) {
    var target = pool[i];
    var mixed = shuffle(q.choices);
    var ai = mixed.indexOf(q.answer);
    var t = mixed[target]; mixed[target] = mixed[ai]; mixed[ai] = t;
    q.shuffled = mixed;
  });
}

  var q = QUESTIONS[current];
  document.getElementById("progress").textContent = (current + 1) + " / " + QUESTIONS.length;
  var cbox = document.getElementById("concept-box");
  if (q.card && CARDS[q.card]) {
    var cd = CARDS[q.card];
    cbox.innerHTML = '<div class="concept"><div class="ctitle">' + cd.title + '</div>' + cd.html + '</div>';
  } else {
    cbox.innerHTML = "";
  }
  document.getElementById("qtext").innerHTML = "Q" + (current + 1) + ". " + q.q;
  var box = document.getElementById("choices");
  box.innerHTML = "";
  q.shuffled.forEach(function (c, i) {
    var b = document.createElement("button");
    b.className = "choice";
    b.innerHTML = '<span class="num">' + CIRCLED[i] + "</span>" + c;
    b.addEventListener("click", function () { pick(c); });
    box.appendChild(b);
  });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function pick(choice) {
  if (locked) return; locked = true;
  var q = QUESTIONS[current];
  var ok = choice === q.answer;
  if (ok) correctCount++;
  else wrongNumbers.push(current + 1);
  answersLog.push({ no: current + 1, ok: ok, chosen: choice, answer: q.answer });
  setTimeout(function () {
    locked = false;
    current++;
    if (current < QUESTIONS.length) showQuestion();
    else showResult();
  }, 250);
}

document.addEventListener("keydown", function (e) {
  if (document.getElementById("quiz-card").classList.contains("hidden")) return;
  var n = parseInt(e.key, 10);
  if (n >= 1 && n <= 4 && !locked) {
    var q = QUESTIONS[current];
    if (q.shuffled && q.shuffled[n - 1] !== undefined) pick(q.shuffled[n - 1]);
  }
});

function cheerMessage() {
  var r = correctCount / QUESTIONS.length;
  if (r === 1) return "전부 다 맞았어요! 최상위권 도전, 이 기세 그대로 가자 🔥";
  if (r >= 0.8) return "훌륭해요! 개념이 거의 다 잡혔어요. 틀린 문제 해설만 한 번 더 읽어보면 완벽 💪";
  if (r >= 0.5) return "좋아요! 해설을 꼼꼼히 읽고 한 번 더 도전하면 훨씬 좋아질 거예요 🌱";
  return "도전한 것만으로도 멋져요! 아래 해설을 천천히 읽고 다시 한 번 풀어보자 😊";
}

function showResult() {
  document.getElementById("quiz-card").classList.add("hidden");
  document.getElementById("result-card").classList.remove("hidden");
  document.getElementById("score-line").textContent = correctCount + " / " + QUESTIONS.length;
  document.getElementById("cheer-line").innerHTML = cheerMessage() + "<br>결과를 <b>복사해서 지나티처에게 카톡으로 꼭</b> 보내주세요!";

  var expBox = document.getElementById("explanations");
  QUESTIONS.forEach(function (q, i) {
    var log = answersLog[i];
    var d = document.createElement("div");
    d.className = "exp" + (log.ok ? "" : " wrong");
    d.innerHTML = '<span class="head">Q' + (i + 1) + ". " + (log.ok ? "정답! ✓" : "다시 보기 (내 답: " + log.chosen + " → 정답: " + q.answer + ")") + "</span><br>" + q.exp;
    expBox.appendChild(d);
  });

  if (!_engfitSent) {
    _engfitSent = true;
    engfitSubmit({
      quizId: "clinic-chajungmin-0724",
      quizTitle: "차정민 오답 클리닉 7/24 (A Peaceful Lake)",
      student: studentName,
      score: correctCount,
      total: QUESTIONS.length,
      wrong: wrongNumbers,
      durationSec: Math.round((Date.now() - startTime) / 1000),
      detail: answersLog
    });
  }
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("kakao-btn").addEventListener("click", function () {
  var mins = Math.round((Date.now() - startTime) / 1000 / 60);
  var msg = "[영핏 오답 클리닉 결과]\n퀴즈: A Peaceful Lake 클리닉 (7/24)\n학생: " + studentName +
            "\n점수: " + correctCount + "/" + QUESTIONS.length +
            "\n틀린 문항: " + (wrongNumbers.length ? wrongNumbers.join(", ") : "없음") +
            "\n풀이 시간: 약 " + mins + "분";
  navigator.clipboard.writeText(msg).then(function () {
    document.getElementById("kakao-btn").textContent = "복사 완료! 카톡에 붙여넣기 하세요 ✓";
  }).catch(function () {
    prompt("아래 내용을 길게 눌러 복사하세요", msg);
  });
});
</script>
