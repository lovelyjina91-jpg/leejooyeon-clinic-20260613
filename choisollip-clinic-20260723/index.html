function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

/* 균형 분산 셔플: n문항을 k개 자리(정답 위치)에 최대한 고르게 배분 */
function balancedAssign(n, k) {
  var base = Math.floor(n / k), rem = n % k;
  var pool = [];
  for (var p = 0; p < k; p++) for (var c = 0; c < base; c++) pool.push(p);
  if (rem > 0) {
    var positions = shuffle((function () { var r = []; for (var q = 0; q < k; q++) r.push(q); return r; })()).slice(0, rem);
    positions.forEach(function (p) { pool.push(p); });
  }
  return shuffle(pool);
}

function prepareShuffles() {
  /* 심경 추론(MOOD_Q) 10문항의 정답 위치를 1~5번에 고르게 분산 */
  var assign = balancedAssign(MOOD_Q.length, 5);
  MOOD_Q.forEach(function (item, idx) {
    var target = assign[idx];
    var wrongs = shuffle(item.choices.filter(function (c) { return c !== item.answer; }));
    var arr = [];
    var wi = 0;
    for (var pos = 0; pos < 5; pos++) {
      if (pos === target) arr.push(item.answer);
      else { arr.push(wrongs[wi]); wi++; }
    }
    item.shuffled = arr;
  });
  /* 지칭 추론(PRONOUN_Q)은 지문 번호와 순서가 고정이라 셔플하지 않음 (noShuffle) */
}

  var box = document.getElementById("choices");
  box.innerHTML = "";
  shuffledChoices = q.noShuffle ? q.choices.slice() : q.shuffled;
  shuffledChoices.forEach(function (c, i) {
    var b = document.createElement("button");
    b.className = "choice";
    if (!q.noShuffle) {
      var span = document.createElement("span");
      span.className = "num";
      span.textContent = CIRCLED[i];
      b.appendChild(span);
    }
    b.appendChild(document.createTextNode(c));
    b.addEventListener("click", function () { pick(qi, c, b); });
    box.appendChild(b);
  });
  show("quiz-card");
}

function pick(qi, choice, btn) {
  if (locked) return; locked = true;
  var q = QUESTIONS[qi];
  var ok = choice === q.answer;
  answersLog.push({ no: qi + 1, ok: ok, chosen: choice, answer: q.answer });
  answeredCount++;
  if (btn) btn.classList.add(ok ? "flash-ok" : "flash-no");
  setTimeout(function () {
    locked = false;
    stepIdx++;
    render();
  }, 250);
}

/* 숫자키 1~5 지원 (문제 화면에서만) */
document.addEventListener("keydown", function (e) {
  if (document.getElementById("quiz-card").classList.contains("hidden")) return;
  var n = parseInt(e.key, 10);
  if (n >= 1 && n <= shuffledChoices.length) {
    var btns = document.getElementById("choices").children;
    if (btns[n - 1]) btns[n - 1].click();
  }
});

function escapeHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

var _engfitSent = false;
function showResult() {
  var correctCount = answersLog.filter(function (l) { return l.ok; }).length;
  var wrongNumbers = answersLog.filter(function (l) { return !l.ok; }).map(function (l) { return l.no; });

  document.getElementById("score-line").textContent = correctCount + " / " + QUESTIONS.length;

  var expBox = document.getElementById("explanations");
  expBox.innerHTML = "";
  QUESTIONS.forEach(function (q, i) {
    var log = answersLog[i];
    var d = document.createElement("div");
    d.className = "exp" + (log.ok ? "" : " wrong");
    var head = "<b>Q" + (i + 1) + ". " + (log.ok ? "정답! ✓" : "오답 (내 답: " + escapeHtml(log.chosen) + " → 정답: " + escapeHtml(q.answer) + ")") + "</b><br>";
    d.innerHTML = head + q.exp + '<br><span class="src">' + q.src + "</span>";
    expBox.appendChild(d);
  });

  if (!_engfitSent) {
    _engfitSent = true;
    engfitSubmit({
      quizId: "clinic-choisollip-0723",
      quizTitle: "최솔립 지칭추론·심경파악 오답 클리닉 7/23",
      student: studentName,
      score: correctCount,
      total: QUESTIONS.length,
      wrong: wrongNumbers,
      durationSec: Math.round((Date.now() - startTime) / 1000),
      detail: answersLog
    });
  }

  document.getElementById("kakao-btn").onclick = function () {
    var msg = "[영핏 오답 클리닉 결과]\n학생: " + studentName +
      "\n퀴즈: 지칭추론·심경파악 클리닉 7/23" +
      "\n점수: " + correctCount + "/" + QUESTIONS.length +
      "\n틀린 문항: " + (wrongNumbers.length ? wrongNumbers.join(", ") : "없음 🎉") +
      "\n제공: 영핏 지나티처";
    navigator.clipboard.writeText(msg).then(function () {
      document.getElementById("kakao-btn").textContent = "복사 완료! 카톡에 붙여넣기 하세요 ✓";
    }).catch(function () {
      prompt("아래 내용을 길게 눌러 복사하세요", msg);
    });
  };

  show("result-card");
}
</script>
